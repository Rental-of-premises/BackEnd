<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rental Service</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            background-color: #2850a7;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 5px 5px 0 0;
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
        }
        .content {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 0 0 5px 5px;
            border: 1px solid #e2e8f0;
            border-top: none;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #94a3b8;
        }
        .footer a {
            color: #2850a7;
            text-decoration: none;
        }
        .button {
            display: inline-block;
            background: linear-gradient(135deg, #2850a7 0%, #1e3c82 100%);
            color: white;
            padding: 12px 28px;
            text-decoration: none;
            border-radius: 8px;
            margin: 10px 0;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(40, 80, 167, 0.2);
        }
        .info-block {
            background: #eef2ff;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #dbeafe;
        }
        .info-block h2 {
            color: #1e3c82;
            margin-top: 0;
        }
        .info-block p {
            color: #2850a7;
            margin: 0;
        }
        .link-box {
            background: #f1f5f9;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }
        .link-box p {
            color: #64748b;
            font-size: 14px;
            margin: 0 0 8px 0;
        }
        .link-box .link {
            word-break: break-all;
            background-color: #ffffff;
            padding: 12px;
            border-radius: 8px;
            color: #2850a7;
            font-size: 14px;
            margin: 0;
            border: 1px solid #e2e8f0;
        }
        .features {
            background: #eef2ff;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #dbeafe;
        }
        .features p {
            color: #1e293b;
            font-weight: 600;
            margin: 0 0 12px 0;
        }
        .features ul {
            color: #334155;
            margin: 0;
            padding-left: 20px;
            line-height: 1.8;
        }
        .contact {
            background: #f8fafc;
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }
        .contact p {
            color: #475569;
            font-size: 14px;
            margin: 0;
        }
        .contact a {
            color: #2850a7;
            text-decoration: none;
            font-weight: 600;
        }
        .warning {
            background: #fef2f2;
            padding: 14px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #fee2e2;
        }
        .warning p {
            color: #64748b;
            font-size: 14px;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏠 Rental Service</h1>
        </div>
        <div class="content">
            {{template "content" .}}
        </div>
        <div class="footer">
            <p>
                <a href="https://team3.verstack.ru" style="color: #2850a7; text-decoration: none;">
                    &copy; 2026 Rental Service
                </a>
            </p>
            <p style="color: #cbd5e1; font-size: 11px; margin-top: 4px;">
                Это автоматическое сообщение, пожалуйста, не отвечайте на него.
            </p>
        </div>
    </div>
</body>
</html>
